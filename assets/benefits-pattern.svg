<svg xmlns="http://www.w3.org/2000/svg" width="600" height="400" viewBox="0 0 600 400" fill="none">
  <g opacity="0.12" stroke="white" stroke-width="2" fill="none">

    <!-- Bone top-left -->
    <g transform="translate(30, 30) rotate(-30)">
      <rect x="12" y="5" width="24" height="10" rx="3"/>
      <circle cx="10" cy="10" r="7"/>
      <circle cx="38" cy="10" r="7"/>
    </g>

    <!-- Paw print top-center -->
    <g transform="translate(260, 18)">
      <ellipse cx="12" cy="18" rx="8" ry="10"/>
      <ellipse cx="3" cy="8" rx="4.5" ry="5.5"/>
      <ellipse cx="12" cy="4" rx="4.5" ry="5.5"/>
      <ellipse cx="21" cy="8" rx="4.5" ry="5.5"/>
    </g>

    <!-- Bowl top-right -->
    <g transform="translate(530, 20)">
      <path d="M0 10 Q15 28 30 10" stroke-linecap="round"/>
      <line x1="-4" y1="10" x2="34" y2="10"/>
      <ellipse cx="15" cy="10" rx="19" ry="4"/>
    </g>

    <!-- Dog treat / star left-mid -->
    <g transform="translate(15, 160) rotate(15)">
      <ellipse cx="12" cy="4" rx="5" ry="4"/>
      <ellipse cx="20" cy="12" rx="4" ry="5"/>
      <ellipse cx="12" cy="20" rx="5" ry="4"/>
      <ellipse cx="4" cy="12" rx="4" ry="5"/>
    </g>

    <!-- Bone center -->
    <g transform="translate(270, 170) rotate(20)">
      <rect x="12" y="5" width="30" height="10" rx="3"/>
      <circle cx="10" cy="10" r="8"/>
      <circle cx="44" cy="10" r="8"/>
    </g>

    <!-- Paw print right-mid -->
    <g transform="translate(540, 160)">
      <ellipse cx="12" cy="18" rx="8" ry="10"/>
      <ellipse cx="3" cy="8" rx="4.5" ry="5.5"/>
      <ellipse cx="12" cy="4" rx="4.5" ry="5.5"/>
      <ellipse cx="21" cy="8" rx="4.5" ry="5.5"/>
    </g>

    <!-- Leaf/treat bottom-left -->
    <g transform="translate(60, 310) rotate(-20)">
      <path d="M0 20 Q10 0 20 0 Q20 20 0 20Z"/>
      <line x1="0" y1="20" x2="20" y2="0"/>
    </g>

    <!-- Bone bottom-center -->
    <g transform="translate(290, 340) rotate(-15)">
      <rect x="10" y="5" width="22" height="9" rx="3"/>
      <circle cx="8" cy="9" r="7"/>
      <circle cx="34" cy="9" r="7"/>
    </g>

    <!-- Star/sparkle bottom-right -->
    <g transform="translate(530, 320)">
      <line x1="12" y1="0" x2="12" y2="24"/>
      <line x1="0" y1="12" x2="24" y2="12"/>
      <line x1="3" y1="3" x2="21" y2="21"/>
      <line x1="21" y1="3" x2="3" y2="21"/>
    </g>

    <!-- Small paw bottom far left -->
    <g transform="translate(140, 340) scale(0.7)">
      <ellipse cx="12" cy="18" rx="8" ry="10"/>
      <ellipse cx="3" cy="8" rx="4.5" ry="5.5"/>
      <ellipse cx="12" cy="4" rx="4.5" ry="5.5"/>
      <ellipse cx="21" cy="8" rx="4.5" ry="5.5"/>
    </g>

    <!-- Treat shape center-right -->
    <g transform="translate(430, 90) rotate(30) scale(0.9)">
      <ellipse cx="12" cy="4" rx="5" ry="4"/>
      <ellipse cx="20" cy="12" rx="4" ry="5"/>
      <ellipse cx="12" cy="20" rx="5" ry="4"/>
      <ellipse cx="4" cy="12" rx="4" ry="5"/>
    </g>

    <!-- Bone top far right area -->
    <g transform="translate(440, 280) rotate(45)">
      <rect x="10" y="4" width="20" height="8" rx="3"/>
      <circle cx="8" cy="8" r="6"/>
      <circle cx="32" cy="8" r="6"/>
    </g>

    <!-- Paw print center-left -->
    <g transform="translate(120, 110) scale(0.85)">
      <ellipse cx="12" cy="18" rx="8" ry="10"/>
      <ellipse cx="3" cy="8" rx="4.5" ry="5.5"/>
      <ellipse cx="12" cy="4" rx="4.5" ry="5.5"/>
      <ellipse cx="21" cy="8" rx="4.5" ry="5.5"/>
    </g>

    <!-- Bowl center-right area -->
    <g transform="translate(360, 310)">
      <path d="M0 8 Q14 24 28 8" stroke-linecap="round"/>
      <line x1="-3" y1="8" x2="31" y2="8"/>
      <ellipse cx="14" cy="8" rx="17" ry="4"/>
    </g>

  </g>
</svg>
